name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install open62541
        run: brew install open62541

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Build
        run: swift build -c debug 2>&1

      - name: Run tests
        run: swift test 2>&1
